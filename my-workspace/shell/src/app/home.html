<main class="min-h-screen bg-slate-100 p-4 sm:p-6">
  <section
    class="mx-auto w-full max-w-6xl space-y-5 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm"
  >
    <header class="space-y-2">
      <h1 class="text-2xl font-bold tracking-tight text-slate-900 sm:text-3xl">
        az-swa-oper-strategy
      </h1>
      <p class="text-sm text-slate-600">
        Domain-driven Angular workspace — Country Strategy Management &amp; Portfolio Supervision
      </p>
    </header>

    <nav class="flex flex-wrap gap-2">
      <a
        [routerLink]="countryStrategyListLink"
        class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition-colors hover:border-slate-900 hover:text-slate-900"
      >
        Country Strategy List
      </a>
      <a
        [routerLink]="countryStrategyDetailLink"
        class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition-colors hover:border-slate-900 hover:text-slate-900"
      >
        Country Strategy Detail
      </a>
    </nav>
  </section>
</main>
