<section class="mx-auto w-full max-w-4xl p-4 sm:p-6">
  <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
    <header class="mb-4">
      <h2 class="text-2xl font-semibold text-slate-900">Country Strategy List</h2>
      <p class="mt-1 text-sm text-slate-600">
        Demo list route to support the final architecture presentation.
      </p>
    </header>

    <ul class="space-y-3">
      @for (strategy of strategies(); track strategy.id) {
        <li class="rounded-xl border border-slate-200 p-3">
          <p class="text-sm font-medium text-slate-900">{{ strategy.title }}</p>
          <p class="text-xs text-slate-600">Owner: {{ strategy.owner }}</p>
          <a
            [routerLink]="['/country-strategy/detail', strategy.id]"
            class="mt-2 inline-flex rounded-lg border border-slate-300 px-3 py-1.5 text-xs font-medium text-slate-700 transition-colors hover:border-slate-900 hover:text-slate-900"
          >
            View detail
          </a>
        </li>
      }
    </ul>
  </div>
</section>
