<section class="mx-auto w-full max-w-3xl p-4 sm:p-6">
  <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
    <h2 class="text-2xl font-semibold text-slate-900">Country Strategy Detail</h2>

    @if (hasCountryStrategyId) {
      <p class="mt-3 text-sm text-slate-600">
        Country Strategy ID:
        <span class="font-medium text-slate-900">{{ countryStrategyId }}</span>
      </p>
      <p class="mt-1 text-sm text-slate-600">
        This is the dedicated entry point to open the generic audit flow.
      </p>
      <a
        [routerLink]="['/audit', auditEntityType, countryStrategyId]"
        class="mt-4 inline-flex rounded-lg border border-slate-300 px-3 py-2 text-xs font-medium text-slate-700 transition-colors hover:border-slate-900 hover:text-slate-900"
      >
        Open audit trail
      </a>
    } @else {
      <p class="mt-3 text-sm text-rose-700">
        Country Strategy not found for the requested id.
      </p>
    }
  </div>
</section>
