<span
  class="inline-flex items-center rounded-full px-2.5 py-1 text-xs font-medium"
  [class.bg-amber-100]="status() === 'pending'"
  [class.text-amber-700]="status() === 'pending'"
  [class.bg-blue-100]="status() === 'paid'"
  [class.text-blue-700]="status() === 'paid'"
  [class.bg-emerald-100]="status() === 'shipped'"
  [class.text-emerald-700]="status() === 'shipped'"
  [class.bg-slate-100]="
    status() !== 'pending' &&
    status() !== 'paid' &&
    status() !== 'shipped'
  "
  [class.text-slate-700]="
    status() !== 'pending' &&
    status() !== 'paid' &&
    status() !== 'shipped'
  "
>
  Status: {{ status() }}
</span>
