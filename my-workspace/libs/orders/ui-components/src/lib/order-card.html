<article
  class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm transition-shadow hover:shadow-md"
>
  <strong class="text-base font-semibold text-slate-900">{{
    order().customerName
  }}</strong>
  <div class="mt-2 text-sm text-slate-600">ID: {{ order().id }}</div>
  <div class="mt-1 text-sm text-slate-600">
    Total: {{ order().total | number: '1.2-2' }}
  </div>
  <div class="mt-3">
    <lib-order-status-badge [status]="order().status"></lib-order-status-badge>
  </div>
</article>
