<section class="mx-auto w-full max-w-4xl space-y-4 p-4 sm:p-6">
  <header>
    <h2 class="text-2xl font-semibold text-slate-900">Orders</h2>
    <p class="mt-1 text-sm text-slate-600">Track all recent customer orders.</p>
  </header>

  <div class="grid gap-3 sm:grid-cols-2">
    @for (order of orders(); track order.id) {
      <lib-order-card [order]="order"></lib-order-card>
    } @empty {
      <p
        class="rounded-xl border border-dashed border-slate-300 bg-slate-50 p-4 text-sm text-slate-600 sm:col-span-2"
      >
        No orders found.
      </p>
    }
  </div>
</section>
