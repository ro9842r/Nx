<section class="mx-auto w-full max-w-3xl p-4 sm:p-6">
  <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
    <h2 class="text-2xl font-semibold text-slate-900">Checkout</h2>
    <div class="mt-4 space-y-1 text-sm text-slate-600">
      <p>Orders in cache: {{ orders().length }}</p>
      <p>
        Total:
        <span class="font-medium text-slate-900">{{ total | currency }}</span>
      </p>
    </div>

    <button
      type="button"
      (click)="createDemoOrder()"
      class="mt-5 inline-flex items-center rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-slate-700"
    >
      Create test order
    </button>

    <p class="mt-3 text-sm text-emerald-700">{{ feedback }}</p>
  </div>
</section>
