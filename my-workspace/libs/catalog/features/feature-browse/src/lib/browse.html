<section class="mx-auto w-full max-w-4xl space-y-4 p-4 sm:p-6">
  <header>
    <h2 class="text-2xl font-semibold text-slate-900">Browse Products</h2>
    <p class="mt-1 text-sm text-slate-600">Explore available items in catalog.</p>
  </header>

  <div class="grid gap-3 sm:grid-cols-2">
    @for (product of products(); track product.id) {
      <lib-product-card [product]="product"></lib-product-card>
    } @empty {
      <p
        class="rounded-xl border border-dashed border-slate-300 bg-slate-50 p-4 text-sm text-slate-600 sm:col-span-2"
      >
        No products available.
      </p>
    }
  </div>
</section>
