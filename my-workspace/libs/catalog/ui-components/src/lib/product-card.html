<article
  class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm transition-shadow hover:shadow-md"
>
  <h3 class="text-base font-semibold text-slate-900">{{ product().name }}</h3>
  <p class="mt-2 text-sm text-slate-600">
    Price: {{ product().price | number: '1.2-2' }}
  </p>
  <div class="mt-3">
    <lib-product-badge [featured]="!!product().featured"></lib-product-badge>
  </div>
</article>
