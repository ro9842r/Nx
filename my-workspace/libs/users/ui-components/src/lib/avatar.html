<div class="inline-flex items-center gap-2 rounded-xl border border-slate-200 bg-white px-3 py-2">
  @if (user()) {
    <span
      class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-slate-900 text-xs font-semibold text-white"
    >
      {{ user()!.name.charAt(0) }}
    </span>
    <strong class="text-sm font-semibold text-slate-900">{{ user()!.name }}</strong>
    <span class="text-sm text-slate-500">({{ user()!.email }})</span>
  } @else {
    <span
      class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-slate-200 text-xs font-semibold text-slate-600"
    >
      G
    </span>
    <span class="text-sm text-slate-600">Guest</span>
  }
</div>
