<section class="mx-auto w-full max-w-md p-4 sm:p-6">
  <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
    <h2 class="text-2xl font-semibold text-slate-900">Login</h2>

    <form (ngSubmit)="submit()" class="mt-4 space-y-3">
      <input
        name="email"
        [(ngModel)]="email"
        placeholder="Email"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 outline-none ring-slate-900/20 transition focus:ring"
      />
      <input
        name="password"
        [(ngModel)]="password"
        type="password"
        placeholder="Password"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 outline-none ring-slate-900/20 transition focus:ring"
      />
      <button
        type="submit"
        class="inline-flex items-center rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-slate-700"
      >
        Sign in
      </button>
    </form>

    <p class="mt-3 text-sm text-slate-600">{{ message }}</p>
  </div>
</section>
